<svg width="400" height="60" xmlns="http://www.w3.org/2000/svg">
  <style>
    .txt {
      font-family: Consolas, "Courier New", monospace;
      font-size: 22px;
      fill: #FFFFFF;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .dot0 { animation: t0 4s forwards; }
    .dot1 { animation: t1 4s forwards; opacity: 0; }
    .dot2 { animation: t2 4s forwards; opacity: 0; }
    .dot3 { animation: t3 4s forwards; opacity: 0; }
    .rose { animation: r 4s forwards; opacity: 0; }

    /* Zamanlama: Her adım yaklaşık 0.8 saniye sürer, sonda gül açar */
    @keyframes t0 { 0%, 19% {opacity: 1;} 20%, 100% {opacity: 0;} }
    @keyframes t1 { 0%, 19% {opacity: 0;} 20%, 39% {opacity: 1;} 40%, 100% {opacity: 0;} }
    @keyframes t2 { 0%, 39% {opacity: 0;} 40%, 59% {opacity: 1;} 60%, 100% {opacity: 0;} }
    @keyframes t3 { 0%, 59% {opacity: 0;} 60%, 85% {opacity: 1;} 86%, 100% {opacity: 0;} }
    @keyframes r  { 0%, 85% {opacity: 0; transform: scale(0.5);} 90%, 100% {opacity: 1; transform: scale(1.5);} }
  </style>

  <g transform="translate(200, 30)">
    <text class="txt dot0">Loading Please Wait</text>
    <text class="txt dot1">Loading Please Wait.</text>
    <text class="txt dot2">Loading Please Wait..</text>
    <text class="txt dot3">Loading Please Wait...</text>

    <g class="rose">
      <g transform="translate(-12, -12)">
        <path d="M12 14v8M12 18c-2 0-4-1-4-3 1 0 2.5 1 4 3z" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M12 15C8 15 6 12 6 9c0-3 3-6 6-7 3 1 6 4 6 7 0 3-2 6-6 6z" fill="#f85149"/>
        <path d="M12 15c-2 0-3-2-3-4 0-2 1.5-4 3-5 1.5 1 3 3 3 5 0 2-1 4-3 4z" fill="#da3633"/>
        <path d="M12 15c-1 0-1.5-1-1.5-2.5 0-1.5 1-2.5 1.5-3 1 .5 1.5 1.5 1.5 3 0 1.5-.5 2.5-1.5 2.5z" fill="#ff7b72"/>
      </g>
    </g>
  </g>
</svg>
