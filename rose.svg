<svg width="400" height="80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#2d5a27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5faf54;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="roseGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="10%" style="stop-color:#ff4d4d;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#c70039;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#800020;stop-opacity:1" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1" result="blur"/>
      <feOffset in="blur" dx="0" dy="1" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .txt {
      font-family: Consolas, monospace;
      font-size: 22px;
      fill: #FFFFFF;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    /* Toplam süre 8 saniye (Daha yavaş) */
    .anim-el { animation-duration: 8s; animation-fill-mode: forwards; animation-iteration-count: infinite; opacity: 0; }
    
    .dot0 { animation-name: t0; }
    .dot1 { animation-name: t1; }
    .dot2 { animation-name: t2; }
    .dot3 { animation-name: t3; }
    .rose-container { animation-name: bloom; transform-origin: center; filter: url(#shadow); }

    /* Yazı Zamanlamaları */
    @keyframes t0 { 0%, 20% {opacity: 1;} 21%, 100% {opacity: 0;} }
    @keyframes t1 { 0%, 21% {opacity: 0;} 22%, 42% {opacity: 1;} 43%, 100% {opacity: 0;} }
    @keyframes t2 { 0%, 43% {opacity: 0;} 44%, 64% {opacity: 1;} 65%, 100% {opacity: 0;} }
    @keyframes t3 { 0%, 65% {opacity: 0;} 66%, 85% {opacity: 1;} 86%, 100% {opacity: 0;} }
    
    /* Gülün Açılma Animasyonu (Küçük ve dönük başlar, büyüyerek açılır) */
    @keyframes bloom  { 
        0%, 85% {opacity: 0; transform: scale(0.1) rotate(-60deg);} 
        92% {opacity: 1; transform: scale(1.1) rotate(5deg);}
        100% {opacity: 1; transform: scale(1) rotate(0deg);} 
    }
  </style>

  <g transform="translate(200, 40)">
    <text class="txt anim-el dot0">Loading Please Wait</text>
    <text class="txt anim-el dot1">Loading Please Wait.</text>
    <text class="txt anim-el dot2">Loading Please Wait..</text>
    <text class="txt anim-el dot3">Loading Please Wait...</text>

    <g class="anim-el rose-container" transform="translate(0, -5)">
      <path d="M-1 25 C-2 15 -5 5 0 0 C5 5 2 15 1 25 Z M0 12 Q-8 8 -12 15 Q-5 18 0 12" fill="url(#stemGrad)"/>
      <g transform="translate(0, -2) scale(1.3)">
         <path d="M0,0 C-8,-12 -12,-4 -8,4 C-4,12 4,12 8,4 C12,-4 8,-12 0,0 Z" fill="url(#roseGrad)"/>
         <path d="M0,2 C-5,-8 -9,-2 -6,5 C-3,10 3,10 6,5 C9,-2 5,-8 0,2 Z" fill="url(#roseGrad)" opacity="0.9" transform="rotate(45)"/>
         <path d="M0,1 C-4,-6 -7,-1 -5,4 C-2,8 2,8 5,4 C7,-1 4,-6 0,1 Z" fill="url(#roseGrad)" opacity="0.95" transform="rotate(-30)"/>
         <circle cx="0" cy="1" r="3" fill="#6b0019" />
      </g>
    </g>
  </g>
</svg>
