<svg width="400" height="80" xmlns="http://www.w3.org/2000/svg">
  <style>
    .txt {
      font-family: Consolas, monospace;
      font-size: 22px;
      fill: #FFFFFF;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    
    /* Yükleniyor yazısının ana kutusu. Sadece bir kez çalışıp görünür kalacak. */
    .text-container {
      animation: text-intro 9.5s forwards;
    }
    
    /* 3 noktaların sonsuz döngüsü */
    .dot0 { animation: d0 3s infinite; opacity: 0; }
    .dot1 { animation: d1 3s infinite; opacity: 0; }
    .dot2 { animation: d2 3s infinite; opacity: 0; }
    .dot3 { animation: d3 3s infinite; opacity: 0; }
    
    /* Gül animasyonu. Çıkar ve sonsuza dek kaybolur. */
    .rose-container {
      animation: rose-intro 9.5s forwards;
      opacity: 0;
      transform-origin: center;
    }

    /* Senaryo Zamanlaması (Toplam 9.5 saniye)
       0s - 3s: Yükleniyor döngüsü görünür
       3s - 4s: Yazı kaybolur, gül belirir
       4s - 7s: Gül ekranda kalır
       7s - 8s: Gül kaybolur, yazı geri gelir
       8s+: Sadece yükleniyor döngüsü sonsuza dek kalır.
    */
    @keyframes text-intro {
      0%, 30% { opacity: 1; }
      40%, 75% { opacity: 0; }
      85%, 100% { opacity: 1; }
    }
    
    @keyframes rose-intro {
      0%, 30% { opacity: 0; transform: scale(0.9) translateY(5px); }
      40%, 75% { opacity: 1; transform: scale(1.2) translateY(0); }
      85%, 100% { opacity: 0; transform: scale(0.9) translateY(-5px); }
    }

    /* Noktaların sırayla yanma döngüsü */
    @keyframes d0 { 0%, 24% {opacity: 1} 25%, 100% {opacity: 0} }
    @keyframes d1 { 0%, 24% {opacity: 0} 25%, 49% {opacity: 1} 50%, 100% {opacity: 0} }
    @keyframes d2 { 0%, 49% {opacity: 0} 50%, 74% {opacity: 1} 75%, 100% {opacity: 0} }
    @keyframes d3 { 0%, 74% {opacity: 0} 75%, 95% {opacity: 1} 96%, 100% {opacity: 0} } 
  </style>

  <g transform="translate(200, 40)">
    <g class="text-container">
      <text class="txt dot0">Loading Please Wait</text>
      <text class="txt dot1">Loading Please Wait.</text>
      <text class="txt dot2">Loading Please Wait..</text>
      <text class="txt dot3">Loading Please Wait...</text>
    </g>

    <g class="rose-container" transform="scale(1.3) translate(-12, -15)">
      <path d="M12 14v8M12 18c-2 0-4-1-4-3 1 0 2.5 1 4 3z" stroke="#7ee787" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15C8 15 6 12 6 9c0-3 3-6 6-7 3 1 6 4 6 7 0 3-2 6-6 6z" stroke="#ff7b72" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15c-2 0-3-2-3-4 0-2 1.5-4 3-5 1.5 1 3 3 3 5 0 2-1 4-3 4z" stroke="#ff7b72" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 15c-1 0-1.5-1-1.5-2.5 0-1.5 1-2.5 1.5-3 1 .5 1.5 1.5 1.5 3 0 1.5-.5 2.5-1.5 2.5z" stroke="#ff7b72" stroke-width="0.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
